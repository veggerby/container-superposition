id: mysql
name: MySQL
description: MySQL 8 with phpMyAdmin web UI
category: database
supports:
    - compose
requires: []
suggests:
    - prometheus
    - grafana
conflicts:
    - redpanda
    - nodejs
    - bun
    - go
    - java
    - dotnet
    - otel-demo-nodejs
serviceOrder: 0
parameters:
    MYSQL_VERSION:
        description: MySQL image version tag
        default: '8'
    MYSQL_PORT:
        description: Host port mapped to MySQL (3306 inside container)
        default: '3306'
    PHPMYADMIN_PORT:
        description: Host port mapped to phpMyAdmin (80 inside container)
        default: '8080'
    MYSQL_DATABASE:
        description: Name of the database to create
        default: devdb
    MYSQL_USER:
        description: MySQL user name
        default: devuser
    MYSQL_PASSWORD:
        description: MySQL user password
        default: devpassword
        sensitive: true
    MYSQL_ROOT_PASSWORD:
        description: MySQL root password
        default: rootpassword
        sensitive: true
tags:
    - database
    - sql
    - mysql
ports:
    - port: 3306
      service: mysql
      protocol: tcp
      description: MySQL database connection
      onAutoForward: notify
      connectionStringTemplate: 'mysql://{mysql_user}:{mysql_password}@{host}:{port}/{mysql_database}'
    - port: 8080
      service: phpmyadmin
      protocol: http
      description: phpMyAdmin web UI
      path: /
      onAutoForward: openBrowser
