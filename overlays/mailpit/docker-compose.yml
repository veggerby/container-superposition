version: '3.8'

services:
    mailpit:
        image: axllent/mailpit:${MAILPIT_VERSION:-latest}
        restart: unless-stopped
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: '1'
            MP_SMTP_AUTH_ALLOW_INSECURE: '1'
        ports:
            - '${MAILPIT_UI_PORT:-8025}:8025'
            - '${MAILPIT_SMTP_PORT:-1025}:1025'
        networks:
            - devnet

networks:
    devnet:
