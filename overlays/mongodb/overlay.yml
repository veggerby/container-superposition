id: mongodb
name: MongoDB
description: MongoDB 8 with Mongo Express web UI
category: database
supports:
    - compose
requires: []
suggests:
    - prometheus
    - grafana
conflicts:
    - redpanda
    - otel-demo-python
    - go
    - java
serviceOrder: 0
parameters:
    MONGODB_VERSION:
        description: MongoDB image version tag
        default: '8'
    MONGODB_PORT:
        description: Host port mapped to MongoDB (27017 inside container)
        default: '27017'
    MONGO_EXPRESS_PORT:
        description: Host port mapped to Mongo Express (8081 inside container)
        default: '8081'
    MONGODB_USER:
        description: MongoDB root username
        default: root
    MONGODB_PASSWORD:
        description: MongoDB root password
        default: example
        sensitive: true
tags:
    - database
    - nosql
    - mongodb
    - document
ports:
    - port: 27017
      service: mongodb
      protocol: tcp
      description: MongoDB database connection
      onAutoForward: notify
      connectionStringTemplate: 'mongodb://{mongo_initdb_root_username}:{mongo_initdb_root_password}@{host}:{port}/'
    - port: 8081
      service: mongo-express
      protocol: http
      description: Mongo Express web UI
      path: /
      onAutoForward: openBrowser
