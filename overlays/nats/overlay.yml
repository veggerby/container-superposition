id: nats
name: NATS
description: Lightweight pub/sub messaging with JetStream
category: messaging
supports:
    - compose
requires: []
suggests:
    - prometheus
    - grafana
conflicts: []
serviceOrder: 0
parameters:
    NATS_VERSION:
        description: NATS image version tag
        default: '2'
    NATS_CLIENT_PORT:
        description: Host port mapped to NATS client (4222 inside container)
        default: '4222'
    NATS_HTTP_PORT:
        description: Host port mapped to NATS monitoring HTTP (8222 inside container)
        default: '8222'
    NATS_CLUSTER_PORT:
        description: Host port mapped to NATS cluster (6222 inside container)
        default: '6222'
tags:
    - database
    - messaging
    - pubsub
    - nats
    - jetstream
ports:
    - port: 4222
      service: nats
      protocol: tcp
      description: NATS client connection
      onAutoForward: notify
      connectionStringTemplate: 'nats://{host}:{port}'
    - port: 8222
      service: nats
      protocol: http
      description: NATS monitoring/stats endpoint
      path: /
      onAutoForward: ignore
