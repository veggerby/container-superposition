version: '3.8'

services:
    nats{{cs.CS_INSTANCE_SUFFIX}}:
        image: nats:${NATS_VERSION:-{{cs.NATS_VERSION}}}-alpine
        restart: unless-stopped
        command:
            - '--jetstream'
            - '--store_dir=/data'
            - '--http_port=8222'
            - '--port=4222'
        volumes:
            - nats-data{{cs.CS_INSTANCE_SUFFIX}}:/data
        ports:
            - '${NATS_CLIENT_PORT:-{{cs.NATS_CLIENT_PORT}}}:4222'
            - '${NATS_HTTP_PORT:-{{cs.NATS_HTTP_PORT}}}:8222'
            - '${NATS_CLUSTER_PORT:-{{cs.NATS_CLUSTER_PORT}}}:6222'
        networks:
            - devnet
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8222/healthz']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    nats-data{{cs.CS_INSTANCE_SUFFIX}}:

networks:
    devnet:
