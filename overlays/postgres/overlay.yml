id: postgres
name: PostgreSQL
description: PostgreSQL 16 database
category: database
supports:
    - compose
requires: []
suggests: []
conflicts:
    - pgvector
tags:
    - database
    - sql
    - postgres
ports:
    - port: 5432
      service: postgres
      protocol: tcp
      description: PostgreSQL database connection
      onAutoForward: notify
      connectionStringTemplate: 'postgresql://{postgres_user}:{postgres_password}@{host}:{port}/{postgres_db}'
parameters:
    POSTGRES_DB:
        description: Name of the database to create
        default: devdb
    POSTGRES_USER:
        description: PostgreSQL superuser name
        default: postgres
    POSTGRES_PASSWORD:
        description: PostgreSQL superuser password
        default: postgres
        sensitive: true
    POSTGRES_PORT:
        description: Host port mapped to PostgreSQL (5432 inside container)
        default: '5432'
    POSTGRES_VERSION:
        description: PostgreSQL major version
        default: '16'
