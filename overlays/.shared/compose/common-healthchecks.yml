# Common Docker Compose Healthcheck Patterns
#
# REFERENCE ONLY — do not import this file via overlay.yml `imports:`.
# This file uses a `healthchecks:` top-level key (not a devcontainer field) and
# is not a valid devcontainer patch. Copy the relevant pattern directly into
# your overlay's docker-compose.yml instead.
#

healthchecks:
    http:
        test: ['CMD-SHELL', 'curl -f http://localhost:${PORT}/health || exit 1']
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s

    postgres:
        test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s

    redis:
        test: ['CMD', 'redis-cli', 'ping']
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s

    mongodb:
        test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s

    mysql:
        test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s
