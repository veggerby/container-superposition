version: '3.8'
services:
    loki:
        image: grafana/loki:${LOKI_VERSION:-latest}
        restart: unless-stopped
        command: -config.file=/etc/loki/loki-config.yaml
        volumes:
            - ./loki-config-loki.yaml:/etc/loki/loki-config.yaml
            - loki_data:/loki
        ports:
            - '${LOKI_PORT:-3100}:3100'
        networks:
            - devnet
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3100/ready']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

volumes:
    loki_data:

networks:
    devnet:
        name: devnet
