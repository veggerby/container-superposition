id: keycloak
name: Keycloak
description: Open-source identity and access management (OIDC/OAuth2)
category: dev
supports:
    - compose
requires:
    - postgres
suggests: []
conflicts: []
serviceOrder: 2
tags:
    - dev
    - auth
    - oidc
    - oauth2
    - identity
ports:
    - port: 8180
      service: keycloak
      protocol: http
      description: Keycloak admin console and auth endpoints
      path: /
      onAutoForward: openBrowser
parameters:
    KEYCLOAK_VERSION:
        description: Keycloak image version tag
        default: '26.0'
    KEYCLOAK_PORT:
        description: Host port mapped to Keycloak HTTP (8180 inside container)
        default: '8180'
    KEYCLOAK_ADMIN:
        description: Keycloak initial admin username
        default: admin
    KEYCLOAK_ADMIN_PASSWORD:
        description: Keycloak initial admin password
        default: admin
        sensitive: true
