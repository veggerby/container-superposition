# yaml-language-server: $schema=https://raw.githubusercontent.com/veggerby/container-superposition/main/tool/schema/config.schema.json
stack: compose
containerName: web-api-node
overlays:
    - nodejs
    - postgres
    - redis
    - otel-collector
    - prometheus
    - grafana
    - loki
env:
    NODE_ENV: development
    OTEL_SERVICE_NAME: web-api-node
