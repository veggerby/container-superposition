# yaml-language-server: $schema=https://raw.githubusercontent.com/veggerby/container-superposition/main/tool/schema/config.schema.json
stack: compose
baseImage: trixie
containerName: kitchen-sink

preset: web-api
presetChoices:
    language: nodejs
    database: postgres
    cache: redis
    broker: nats
    observability: full

overlays:
    - mongodb
    - aws-cli
    - codex
    - git-helpers
    - modern-cli-tools
    - playwright

portOffset: 100
target: local
minimal: false
editor: vscode

env:
    APP_NAME: kitchen-sink
    API_BASE_URL:
        value: ${API_BASE_URL:-http://localhost:3000}
        target: auto

customizations:
    devcontainerPatch:
        mounts:
            - source=${localEnv:HOME}${localEnv:USERPROFILE}/.codex,target=/home/vscode/.codex,type=bind,consistency=cached
    dockerComposePatch:
        services:
            app:
                labels:
                    com.example.project: kitchen-sink
    envTemplate:
        LOG_LEVEL: debug
        NODE_ENV: development
    scripts:
        postCreate:
            - echo "Kitchen sink devcontainer ready"
            - npm install --if-present
        postStart:
            - echo "Services are starting..."
    files:
        - path: notes.md
          content: |
              # Kitchen Sink Example

              This devcontainer was generated from a project file
              that exercises every supported configuration option.
