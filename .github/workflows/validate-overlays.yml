name: Validate Overlays

on:
    push:
        branches:
            - main
        paths:
            - 'overlays/**'
            - 'tool/**'
            - 'tests/behave/**'
            - 'scripts/**'
            - 'package.json'
            - 'Taskfile.yml'
            - 'superposition.yml'
            - '.github/workflows/validate-overlays.yml'
    pull_request:
        paths:
            - 'overlays/**'
            - 'tool/**'
            - 'tests/behave/**'
            - 'scripts/**'
            - 'package.json'
            - 'Taskfile.yml'
            - 'superposition.yml'
            - '.github/workflows/validate-overlays.yml'

jobs:
    validate:
        name: Validate Overlay Configuration
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Lint code
              run: npm run lint

            - name: Build TypeScript
              run: npm run build

            - name: Run doctor
              run: npm run init -- doctor

            - name: Validate overlays
              run: npm test

            - name: Run Behave BDD suite
              run: npm run test:bdd

            - name: Test compositions
              run: npm run test:smoke
