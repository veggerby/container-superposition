name: Validate Documentation

on:
    pull_request:
        paths:
            - 'overlays/**'
            - 'docs/generate-docs.ts'
            - 'scripts/generate-schema.ts'
            - 'tool/schema/types.ts'
            - 'tool/schema/project-config.ts'
            - '.github/workflows/generate-docs.yml'

jobs:
    docs:
        name: Validate Generated Documentation
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Lint code
              run: npm run lint

            - name: Build TypeScript
              run: npm run build

            - name: Generate overlay documentation
              run: npm run docs:generate

            - name: Generate superposition.yml schema
              run: npm run schema:generate

            - name: Check for uncommitted changes
              run: |
                  if [ -n "$(git status --porcelain docs/ tool/schema/superposition.schema.json)" ]; then
                    echo "❌ Generated files are out of sync!"
                    echo ""
                    echo "The following files have uncommitted changes:"
                    git status --porcelain docs/ tool/schema/superposition.schema.json
                    echo ""
                    echo "Diff of changes:"
                    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                    git diff docs/ tool/schema/superposition.schema.json
                    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                    echo ""
                    echo "Please run 'npm run docs:generate' and 'npm run schema:generate' locally and commit the changes."
                    exit 1
                  else
                    echo "✅ Generated files are up to date"
                  fi
