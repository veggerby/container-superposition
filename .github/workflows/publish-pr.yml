name: Publish PR prerelease to npm

on:
    pull_request:
        types: [opened, synchronize, reopened]

jobs:
    publish-prerelease:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            id-token: write # Required for npm provenance
            pull-requests: write # Required to post version comment

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: npm ci

            - name: Compute prerelease version
              id: version
              run: |
                  BASE_VERSION=$(node -p "require('./package.json').version")
                  PR_NUMBER=${{ github.event.pull_request.number }}
                  RUN_NUMBER=${{ github.run_number }}
                  VERSION="${BASE_VERSION}-pr.${PR_NUMBER}.${RUN_NUMBER}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Prerelease version: $VERSION"

            - name: Lint code
              run: npm run lint

            - name: Build
              run: npm run build

            - name: Run tests
              run: npm test

            - name: Update package.json version
              run: |
                  npm version ${{ steps.version.outputs.version }} --no-git-tag-version
                  echo "Updated package.json to version ${{ steps.version.outputs.version }}"

            - name: Verify package contents
              run: |
                  echo "📦 Package contents preview:"
                  npm pack --dry-run

            - name: Publish prerelease to npm
              run: npm publish --provenance --access public --tag pr-${{ github.event.pull_request.number }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Comment on PR with prerelease version
              uses: actions/github-script@v7
              with:
                  script: |
                      const version = '${{ steps.version.outputs.version }}';
                      const prNumber = ${{ github.event.pull_request.number }};
                      const tag = `pr-${prNumber}`;
                      const body = [
                        '## 📦 Prerelease published to npm',
                        '',
                        `A prerelease version has been published for this PR:`,
                        '',
                        '```',
                        `npm install container-superposition@${version}`,
                        '```',
                        '',
                        `Or install using the PR tag (always resolves to the latest build for this PR):`,
                        '',
                        '```',
                        `npm install container-superposition@${tag}`,
                        '```',
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: prNumber,
                      });

                      const existing = comments.find(c =>
                        c.user.login === 'github-actions[bot]' &&
                        c.body.includes('## 📦 Prerelease published to npm')
                      );

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: prNumber,
                          body,
                        });
                      }
