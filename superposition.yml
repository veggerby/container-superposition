# yaml-language-server: $schema=https://raw.githubusercontent.com/veggerby/container-superposition/main/tool/schema/config.schema.json
stack: plain
baseImage: trixie
containerName: Container Superposition
overlays:
    - nodejs
    - codex
    - spec-kit
    - docker-sock
    - git-helpers
    - modern-cli-tools
outputPath: ./.devcontainer
customizations:
    devcontainerPatch:
        remoteEnv:
            SPECIFY_AI_AGENT: codex
            CODEX_HOME: /workspaces/container-superposition/.codex
