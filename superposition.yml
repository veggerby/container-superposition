$schema: https://raw.githubusercontent.com/veggerby/container-superposition/main/tool/schema/superposition.schema.json
stack: plain
baseImage: trixie
containerName: Container Superposition
overlays:
    - nodejs
    - pi
    - docker-sock
    - git-helpers
    - modern-cli-tools
    - devcontainer-cli
    - task
mounts:
    pi:
        source: ${localEnv:HOME}${localEnv:USERPROFILE}/.pi
        destination: /home/vscode/.pi
        type: bind
        cached: true
